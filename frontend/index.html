<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema culinário de receitas</title>
    <link rel="stylesheet" href="./styles/style.css" />
</head>
<body>
  <main>
    <h1>Sistema culinário de receitas</h1>

    <!-- Formulário -->
    <form id="form-receita">
        <input id="nome" placeholder="Nome da receita" required />
        <input id="ingredientes" placeholder="Ingredientes" required />
        <input id="modo_preparo" placeholder="Modo de preparo" required />
        <button type="submit">Cadastrar receita</button>
    </form>

    <ul id="listar-receitas"></ul>
  </main>

  <script type="module" src="./scripts/app.js"></script>
</body>
</html>
